<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card shadow border-0">
      <div class="card-body p-4 text-center">
        <i class="bi bi-person-circle fs-1 text-danger"></i>
        <h3 class="mb-4 text-danger fw-bold">Iniciar Sesión</h3>
        
        <form #loginForm="ngForm" (ngSubmit)="onLogin()">
          <div class="mb-3 text-start">
            <label class="form-label fw-bold">Usuario</label>
            <input type="text" name="user" [(ngModel)]="usuario" class="form-control" required>
          </div>
          <div class="mb-3 text-start">
            <label class="form-label fw-bold">Contraseña</label>
            <input type="password" name="pass" [(ngModel)]="password" class="form-control" required>
          </div>
          
          <button type="submit" class="btn btn-danger w-100 fw-bold" [disabled]="!loginForm.valid">
            ENTRAR
          </button>

          <div class="mt-4 pt-3 border-top">
            <p class="text-muted small mb-2">¿No tienes cuenta todavía?</p>
            <a routerLink="/registro" class="btn btn-outline-secondary w-100 btn-sm fw-bold">
              CREAR CUENTA NUEVA
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
